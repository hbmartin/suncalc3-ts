allowBuilds:
  esbuild: true
# Supply-chain guard: only resolve package versions published at least 3 days
# ago (in minutes). The excludes below use bare names so they keep applying
# across version bumps; they exist because we intentionally track fresh
# releases of the vitest and typedoc toolchains.
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - vitest
  - "@vitest/*"
  - typedoc
